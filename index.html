<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ふわふわどりーむ・ドリームシミュレーター</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap');
        
        body {
            font-family: 'Kosugi+Maru', sans-serif;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5, #e8eaf6, #e0f2f1, #fffde7);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            overflow: hidden;
            transition: background 1s ease;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 浮遊スピード用のCSS変数 */
        :root {
            --float-duration: 6s;
        }

        /* ふんわり浮遊アニメーション */
        .float-gentle {
            animation: float var(--float-duration) ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-18px) rotate(1deg); }
        }

        /* ゆらゆら動く飾り */
        .sway-slow {
            animation: sway 7s ease-in-out infinite alternate;
        }
        @keyframes sway {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(15px, -15px) rotate(10deg); }
        }

        .sway-reverse {
            animation: swayRev 8s ease-in-out infinite alternate;
        }
        @keyframes swayRev {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-15px, -10px) rotate(-8deg); }
        }

        /* ガーランドライトのやさしい点滅 */
        .twinkle {
            animation: twinkle 2.5s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.4; transform: scale(0.85); filter: drop-shadow(0 0 2px rgba(255,235,59,0.4)); }
            50% { opacity: 1; transform: scale(1.15); filter: drop-shadow(0 0 12px rgba(255,235,59,0.9)); }
        }

        /* 背景の虹のゆっくりした浮遊 */
        .rainbow-float {
            animation: rainbowFloat 10s ease-in-out infinite;
        }
        @keyframes rainbowFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(4deg); }
        }

        .rainbow-float-2 {
            animation: rainbowFloat2 12s ease-in-out infinite;
        }
        @keyframes rainbowFloat2 {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(10px) rotate(-5deg); }
        }

        /* 背景リボンのひらひらモーション */
        .ribbon-drift {
            animation: ribbonDrift 7s ease-in-out infinite;
        }
        @keyframes ribbonDrift {
            0%, 100% { transform: translateY(0px) translateX(0px) rotate(-6deg); }
            50% { transform: translateY(-20px) translateX(12px) rotate(6deg); }
        }

        .ribbon-drift-2 {
            animation: ribbonDrift2 9s ease-in-out infinite;
        }
        @keyframes ribbonDrift2 {
            0%, 100% { transform: translateY(0px) translateX(0px) rotate(8deg); }
            50% { transform: translateY(-15px) translateX(-10px) rotate(-8deg); }
        }

        /* 雲のたゆたう動き */
        .cloud-left {
            animation: cloudMoveLeft 26s linear infinite;
        }
        .cloud-right {
            animation: cloudMoveRight 30s linear infinite;
        }
        @keyframes cloudMoveLeft {
            0% { transform: translateX(-8%); }
            50% { transform: translateX(8%); }
            100% { transform: translateX(-8%); }
        }
        @keyframes cloudMoveRight {
            0% { transform: translateX(8%); }
            50% { transform: translateX(-8%); }
            100% { transform: translateX(8%); }
        }

        /* 画像を彩る魔法のオーラ */
        .glow-aura-card {
            box-shadow: 0 0 60px rgba(243, 229, 245, 0.8), 0 0 100px rgba(252, 228, 236, 0.6);
            animation: auraPulse 6s ease-in-out infinite;
            transition: border-radius 0.5s ease;
        }
        @keyframes auraPulse {
            0%, 100% { box-shadow: 0 0 50px rgba(243, 229, 245, 0.7), 0 0 90px rgba(252, 228, 236, 0.5); }
            50% { box-shadow: 0 0 80px rgba(244, 143, 177, 0.9), 0 0 130px rgba(224, 242, 241, 0.8); }
        }

        /* カプセル型ネオンバー */
        .neon-capsule-bar {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(225, 190, 231, 0.9);
            box-shadow: 0 0 20px rgba(225, 190, 231, 0.7), inset 0 0 10px rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }
        .neon-capsule-bar:focus-within {
            border-color: rgba(244, 143, 177, 0.9);
            box-shadow: 0 0 30px rgba(244, 143, 177, 0.9), 0 4px 15px rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.95);
        }

        /* ふわふわ浮かぶテキスト・スタンプ吹き出し */
        .bubble-msg {
            animation: bubbleUp 4.5s ease-out forwards;
        }
        @keyframes bubbleUp {
            0% { transform: translateY(60px) scale(0.5) rotate(0deg); opacity: 0; }
            10% { transform: translateY(0px) scale(1.15) rotate(6deg); opacity: 1; }
            15% { transform: scale(1) rotate(-6deg); }
            85% { opacity: 1; }
            100% { transform: translateY(-320px) scale(0.6) rotate(25deg); opacity: 0; }
        }

        /* スクロールバー非表示 */
        ::-webkit-scrollbar {
            display: none;
        }

        /* スタンプボタンのスタイリング */
        .stamp-tray {
            position: relative;
            padding: 12px 14px;
            border-radius: 999px;
            background:
                radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.95) 0 5px, transparent 6px),
                radial-gradient(circle at 84% 24%, rgba(255, 255, 255, 0.9) 0 4px, transparent 5px),
                linear-gradient(135deg, rgba(255, 240, 248, 0.9), rgba(239, 246, 255, 0.86), rgba(255, 253, 231, 0.82));
            border: 2px solid rgba(255, 196, 221, 0.85);
            box-shadow:
                0 14px 35px rgba(244, 143, 177, 0.28),
                0 0 22px rgba(255, 255, 255, 0.9) inset;
            backdrop-filter: blur(12px);
        }
        .stamp-tray::before,
        .stamp-tray::after {
            content: "✦";
            position: absolute;
            color: #ff8ac2;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.95), 0 0 14px rgba(255, 128, 171, 0.8);
            animation: trayTwinkle 1.8s ease-in-out infinite;
            pointer-events: none;
        }
        .stamp-tray::before {
            left: 14px;
            top: -10px;
            font-size: 18px;
        }
        .stamp-tray::after {
            right: 16px;
            bottom: -9px;
            font-size: 15px;
            animation-delay: -0.8s;
        }
        @keyframes trayTwinkle {
            0%, 100% { opacity: 0.45; transform: scale(0.8) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.2) rotate(18deg); }
        }
        .stamp-btn {
            position: relative;
            isolation: isolate;
            width: 52px;
            height: 52px;
            background:
                radial-gradient(circle at 32% 22%, rgba(255, 255, 255, 0.98) 0 9px, transparent 10px),
                linear-gradient(145deg, rgba(255, 255, 255, 0.97), rgba(255, 226, 241, 0.92) 48%, rgba(225, 245, 254, 0.9));
            border: 2px solid rgba(255, 178, 200, 0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow:
                0 7px 16px rgba(244, 143, 177, 0.25),
                0 0 0 4px rgba(255, 255, 255, 0.55) inset,
                0 0 18px rgba(255, 255, 255, 0.85);
            overflow: visible;
        }
        .stamp-btn::before {
            content: "";
            position: absolute;
            inset: -5px;
            border-radius: 999px;
            background: conic-gradient(from 45deg, #ff80ab, #fff59d, #80deea, #ce93d8, #ff80ab);
            opacity: 0.55;
            filter: blur(8px);
            z-index: -1;
            animation: stampAura 4s linear infinite;
        }
        .stamp-btn::after {
            content: "✧";
            position: absolute;
            right: -3px;
            top: -8px;
            color: #fff176;
            font-size: 14px;
            line-height: 1;
            text-shadow: 0 0 5px #fff, 0 0 10px #ff80ab;
            animation: stampSparkle 1.7s ease-in-out infinite;
        }
        @keyframes stampAura {
            to { transform: rotate(360deg); }
        }
        @keyframes stampSparkle {
            0%, 100% { opacity: 0.45; transform: scale(0.72) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.18) rotate(24deg); }
        }
        .stamp-btn:hover {
            transform: translateY(-4px) scale(1.18) rotate(8deg);
            background:
                radial-gradient(circle at 32% 22%, #fff 0 10px, transparent 11px),
                linear-gradient(145deg, #ffffff, #ffd7eb 48%, #d7f7ff);
            border-color: #ff80ab;
            box-shadow:
                0 14px 30px rgba(244, 143, 177, 0.48),
                0 0 0 4px rgba(255, 255, 255, 0.7) inset,
                0 0 28px rgba(255, 241, 118, 0.8);
        }
        .stamp-btn:active {
            transform: scale(0.85) rotate(-5deg);
        }
        .stamp-tray .stamp-btn::after {
            display: none;
        }
        .stamp-tray .stamp-btn:nth-of-type(1)::after { content: ""; }
        /* 🌈 夢色レインボー用：ふんわりピンクから淡いイエロー、スカイブルーへの鮮やかグラデーション */
        .stamp-tray .stamp-btn:nth-of-type(1) { background: radial-gradient(circle at 32% 22%, #fff 0 10px, transparent 11px), linear-gradient(145deg, #ffebee, #fffde7, #e0f7fa); }
        
        .stamp-tray .stamp-btn:nth-of-type(2)::after { content: ""; }
        /* 🍹 メロディソーダ用：爽快なアクアスカイミント */
        .stamp-tray .stamp-btn:nth-of-type(2) { background: radial-gradient(circle at 32% 22%, #fff 0 10px, transparent 11px), linear-gradient(145deg, #e0f7fa, #b2ebf2); }
        
        .stamp-tray .stamp-btn:nth-of-type(3)::after { content: ""; }
        .stamp-tray .stamp-btn:nth-of-type(3) { background: radial-gradient(circle at 32% 22%, #fff 0 10px, transparent 11px), linear-gradient(145deg, #fffbd4, #dff7ff); }
        .stamp-tray .stamp-btn:nth-of-type(4)::after { content: ""; }
        .stamp-tray .stamp-btn:nth-of-type(4) { background: radial-gradient(circle at 32% 22%, #fff 0 10px, transparent 11px), linear-gradient(145deg, #f4e9ff, #dfecff); }
        .stamp-tray .stamp-btn:nth-of-type(5)::after { content: ""; }
        .stamp-tray .stamp-btn:nth-of-type(5) { background: radial-gradient(circle at 32% 22%, #fff 0 10px, transparent 11px), linear-gradient(145deg, #fff6c7, #ffe2aa); }
        .stamp-tray .stamp-btn:nth-of-type(6) { order: 8; }
        .stamp-tray .stamp-btn:nth-of-type(6)::after { content: ""; }
        .stamp-tray .stamp-btn:nth-of-type(6) { background: radial-gradient(circle at 32% 22%, #fff 0 10px, transparent 11px), linear-gradient(145deg, #ffe0f0, #fff1b8); }
        .stamp-tray .stamp-btn:nth-of-type(7) { order: 6; }
        .stamp-tray .stamp-btn:nth-of-type(7)::after { content: ""; }
        .stamp-tray .stamp-btn:nth-of-type(7) { background: radial-gradient(circle at 32% 22%, #fff 0 10px, transparent 11px), linear-gradient(145deg, #ffe0ef, #ffc1da); }
        .stamp-tray .stamp-btn:nth-of-type(8) { order: 7; }
        .stamp-tray .stamp-btn:nth-of-type(8)::after { content: ""; }
        .stamp-tray .stamp-btn:nth-of-type(8) { background: radial-gradient(circle at 32% 22%, #fff 0 10px, transparent 11px), linear-gradient(145deg, #e7fbff, #eadcff); }
        .stamp-tray .stamp-btn svg {
            filter: drop-shadow(0 3px 4px rgba(216, 27, 96, 0.18));
        }
    
        @media (max-width: 640px){
            .stamp-tray{
                width: min(100%, 340px);
                padding: 10px 12px;
                gap: 8px !important;
            }
            .stamp-btn{
                width: 48px !important;
                height: 48px !important;
            }
            #togglePanelBtn{
                max-width: calc(100vw - 24px);
                white-space: nowrap;
            }
            #controlPanel{
                width: min(280px, calc(100vw - 24px)) !important;
                max-height: calc(100svh - 82px);
                overflow-y: auto;
                padding: 14px !important;
            }
            .mobile-settings-fix{
                position: fixed !important;
                top: max(8px, env(safe-area-inset-top)) !important;
                right: 12px !important;
                left: auto !important;
                max-width: calc(100vw - 24px);
                z-index: 60 !important;
            }
        }

</style>
</head>

            <path d="M50,30 C15,5 5,40 50,30" fill="#fce4ec" stroke="#f48fb1" stroke-width="2"/>
            <path d="M50,30 C85,5 95,40 50,30" fill="#fce4ec" stroke="#f48fb1" stroke-width="2"/>
            <circle cx="50" cy="30" r="6" fill="#fff" stroke="#f48fb1" stroke-width="2"/>

        <svg class="w-10 h-10" viewBox="0 0 100 100">
            <path d="M30,20 A35,35 0 1,0 80,70 A28,28 0 1,1 30,20 Z" fill="#ffe082" stroke="#ffa000" stroke-width="2" />
        </svg>
    </div>

    <!-- 追加のゆらゆら装飾: 右上のお星様 -->

    <!-- メイン「ふわふわどりーむ」カードエリア -->

            </div>

            <!-- insuta.png メイン画像 -->

                id="mainImage"

        // 音声エンジンの初期化と明示的なアンロック
        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function unlockAudioEngine() {
            if (audioUnlocked) return;
            try {
                initAudioContext();
                if (audioCtx) {
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                    // iOS制限を100%クリアするための無音ダミーバッファ生成と再生
                    const buffer = audioCtx.createBuffer(1, 1, 22050);
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioCtx.destination);
                    source.start(0);
                    source.stop(0.01);
                    audioUnlocked = true;
                    console.log("Audio Engine Unlocked Successfully!");
                }
            } catch (e) {
                console.error("Audio unlock failed: ", e);
            }
        }

        function playStampNote(stampKey) {
            if (!soundEnabled) return;
            unlockAudioEngine();

            // キャラクターに合わせたピッチ＆音階のマッピング
            const stampNotes = {
                rainbow_stamp: 523.25,  // C5 (夢色レインボー：澄んださわやかな音)
                pastel_soda: 587.33,    // D5 (パステルソーダ：軽快な音)
                moon: 659.25,           // E5
                cup: 698.46,            // F5
                star_special: 783.99,   // G5
                heart_note: 880.00,     // A5
                ribbon_note: 987.77,    // B5
                wand: 1046.50           // C6
            };

            if (audioCtx) {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                playMelodyTone(stampNotes[stampKey] || 523.25, 0);
            }
        }

        function playMelodyTone(freq, startOffset) {
            if (!audioCtx) return;
            const startTime = audioCtx.currentTime + startOffset;
            const partials = [
                { ratio: 1, gain: 0.12, type: 'sine', length: 0.55 },
                { ratio: 2, gain: 0.035, type: 'triangle', length: 0.38 },
                { ratio: 3, gain: 0.018, type: 'sine', length: 0.28 }
            ];

            partials.forEach((partial) => {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                const endTime = startTime + partial.length;

                osc.type = partial.type;
                osc.frequency.setValueAtTime(freq * partial.ratio, startTime);
                osc.frequency.exponentialRampToValueAtTime(freq * partial.ratio * 1.008, startTime + 0.08);

                gainNode.gain.setValueAtTime(0.001, startTime);
                gainNode.gain.linearRampToValueAtTime(partial.gain, startTime + 0.018);
                gainNode.gain.exponentialRampToValueAtTime(0.001, endTime);

                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start(startTime);
                osc.stop(endTime + 0.03);
            });

            const sparkleDelay = 0.055;
            const sparkle = audioCtx.createOscillator();
            const sparkleGain = audioCtx.createGain();
            const sparkleStart = startTime + sparkleDelay;
            const sparkleEnd = sparkleStart + 0.18;

            sparkle.type = 'sine';
            sparkle.frequency.setValueAtTime(freq * 4, sparkleStart);
            sparkle.frequency.exponentialRampToValueAtTime(freq * 5.02, sparkleEnd);

            sparkleGain.gain.setValueAtTime(0.001, sparkleStart);
            sparkleGain.gain.linearRampToValueAtTime(0.028, sparkleStart + 0.012);
            sparkleGain.gain.exponentialRampToValueAtTime(0.001, sparkleEnd);

            sparkle.connect(sparkleGain);
            sparkleGain.connect(audioCtx.destination);
            sparkle.start(sparkleStart);
            sparkle.stop(sparkleEnd + 0.02);
        }

        function playTone(delayMs) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sine';
            const notes = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50, 1174.66, 1318.51, 1567.98];
            const freq = notes[Math.floor(Math.random() * notes.length)];
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.04);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.9);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 1.0);
        }

        // テーマプリセット
        const themePresets = {

        let currentPalette = [...themePresets.default.colors];

        function setTheme(themeKey) {

        const particles = [];
        const backgroundBubbles = []; 
        const airDusts = [];

        class AmbientBubble {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height;
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 80;
                const types = ['bubble', 'bubble', 'star', 'moon', 'mini-ribbon', 'mini-rainbow'];
                this.type = types[Math.floor(Math.random() * types.length)];
                
                this.size = Math.random() * 22 + 6;
                this.speed = Math.random() * 0.4 + 0.15;
                this.wobbleSpeed = Math.random() * 0.01 + 0.003;
                this.wobbleDistance = Math.random() * 15 + 5;
                this.angle = Math.random() * Math.PI * 2;
                this.color = currentPalette[Math.floor(Math.random() * currentPalette.length)];
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.015;
            }

            update() {
                this.y -= this.speed;
                this.angle += this.wobbleSpeed;
                this.rotation += this.rotSpeed;
                this.currentX = this.x + Math.sin(this.angle) * this.wobbleDistance;

                if (this.y < -this.size - 25) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.currentX, this.y);
                ctx.rotate(this.rotation);

                if (this.type === 'bubble') {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    let gradient = ctx.createRadialGradient(-this.size * 0.35, -this.size * 0.35, this.size * 0.05, 0, 0, this.size);
                    gradient.addColorStop(0, 'rgba(255, 255, 255, 0.98)');
                    gradient.addColorStop(0.25, this.color);
                    gradient.addColorStop(0.75, 'rgba(255, 255, 255, 0.05)');
                    gradient.addColorStop(1, 'rgba(255, 255, 255, 0.3)');
                    
                    ctx.fillStyle = gradient;
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.45)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.fill();
                } else if (this.type === 'star') {
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = this.color;
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        ctx.lineTo(0, -this.size * 0.8);
                        ctx.lineTo(this.size * 0.22, -this.size * 0.22);
                        ctx.rotate(Math.PI * 2 / 5);
                    }
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = 0.55;
                    ctx.fill();
                } else if (this.type === 'moon') {
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = this.color;
                    ctx.globalAlpha = 0.55;
                    ctx.beginPath();
                    ctx.arc(-this.size * 0.3, 0, this.size * 0.8, -Math.PI/2, Math.PI/2);
                    ctx.arc(-this.size * 0.1, 0, this.size * 0.6, Math.PI/2, -Math.PI/2, true);
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'mini-ribbon') {
                    ctx.globalAlpha = 0.6;
                    ctx.beginPath();
                    ctx.bezierCurveTo(0, 0, -this.size, -this.size, -this.size, 0);
                    ctx.bezierCurveTo(-this.size, this.size, 0, 0, 0, 0);
                    ctx.bezierCurveTo(0, 0, this.size, -this.size, this.size, 0);
                    ctx.bezierCurveTo(this.size, this.size, 0, 0, 0, 0);
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.2, 0, Math.PI*2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                } else if (this.type === 'mini-rainbow') {
                    ctx.globalAlpha = 0.55;
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#ff8a80';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.7, Math.PI, 0);
                    ctx.stroke();
                    ctx.strokeStyle = '#fff59d';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.5, Math.PI, 0);
                    ctx.stroke();
                    ctx.strokeStyle = '#80deea';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.3, Math.PI, 0);
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        class Dust {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.8;
                this.speedX = (Math.random() - 0.5) * 0.15;
                this.speedY = -Math.random() * 0.1 - 0.05;
                this.alpha = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y < -5) this.y = canvas.height + 5;
                if (this.x < -5) this.x = canvas.width + 5;
                if (this.x > canvas.width + 5) this.x = -5;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#fff59d';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Sparkle {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type || 'star';
                this.size = Math.random() * 15 + 6;
                this.speedX = (Math.random() - 0.5) * 7.5;
                this.speedY = (Math.random() - 0.5) * 7.5 - 2.0;
                this.gravity = 0.045;
                this.color = currentPalette[Math.floor(Math.random() * currentPalette.length)];
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.008;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.15;
            }

            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
                this.rotation += this.rotSpeed;
            }

            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 12;
                ctx.shadowColor = this.color;

                if (this.type === 'star') {
                    ctx.beginPath();
                    for (let i = 0; i < 4; i++) {
                        ctx.lineTo(0, -this.size);
                        ctx.lineTo(this.size * 0.25, -this.size * 0.25);
                        ctx.rotate(Math.PI / 2);
                    }
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'moon') {
                    ctx.beginPath();
                    ctx.arc(-this.size*0.2, 0, this.size*0.6, -Math.PI/2, Math.PI/2);
                    ctx.arc(0, 0, this.size*0.4, Math.PI/2, -Math.PI/2, true);
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(this.size*0.3, this.size*0.3, this.size*0.3, 0, Math.PI*2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                } else if (this.type === 'heart') {
                    ctx.beginPath();
                    ctx.moveTo(0, this.size * 0.35);
                    ctx.bezierCurveTo(-this.size * 0.75, -this.size * 0.3, -this.size * 0.75, -this.size, 0, -this.size * 0.4);
                    ctx.bezierCurveTo(this.size * 0.75, -this.size, this.size * 0.75, -this.size * 0.3, 0, this.size * 0.35);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (this.type === 'bubble') {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.8, 0, Math.PI * 2);
                    let grad = ctx.createRadialGradient(-this.size*0.2, -this.size*0.2, 1, 0, 0, this.size*0.8);
                    grad.addColorStop(0, '#fff');
                    grad.addColorStop(0.3, this.color);
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                    ctx.lineWidth = 1;
                    ctx.fill();
                    ctx.stroke();
                } else if (this.type === 'ribbon') {
                    ctx.beginPath();
                    ctx.bezierCurveTo(0, 0, -this.size, -this.size * 0.8, -this.size, 0);
                    ctx.bezierCurveTo(-this.size, this.size * 0.8, 0, 0, 0, 0);
                    ctx.bezierCurveTo(0, 0, this.size, -this.size * 0.8, this.size, 0);
                    ctx.bezierCurveTo(this.size, this.size * 0.8, 0, 0, 0, 0);
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-2, 2);
                    ctx.lineTo(-this.size * 0.6, this.size * 0.9);
                    ctx.moveTo(2, 2);
                    ctx.lineTo(this.size * 0.6, this.size * 0.9);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.25, 0, Math.PI*2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                } else if (this.type === 'rainbow') {
                    ctx.lineWidth = 2.5;
                    ctx.strokeStyle = '#ff80ab';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.7, Math.PI, 0);
                    ctx.stroke();
                    ctx.strokeStyle = '#ffd54f';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.5, Math.PI, 0);
                    ctx.stroke();
                    ctx.strokeStyle = '#80deea';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.3, Math.PI, 0);
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        // 初期シャボン玉・リボンたちの作成（合計40個）
        for (let i = 0; i < 40; i++) {
            backgroundBubbles.push(new AmbientBubble());
        }

        // 光のダストパーティクル（50個）
        for (let i = 0; i < 50; i++) {
            airDusts.push(new Dust());
        }

        // インタラクション判定
        function spawnSparkles(clientX, clientY) {
            let effect = activeEffect;
            if (effect === 'mix') {
                const types = ['star', 'heart', 'bubble', 'moon', 'ribbon', 'rainbow'];
                effect = types[Math.floor(Math.random() * types.length)];
            } else if (effect === 'ribbon_rainbow') {
                effect = Math.random() > 0.5 ? 'ribbon' : 'rainbow';
            } else if (effect === 'star') {
                effect = Math.random() > 0.3 ? 'star' : 'moon';
            }
            
            const spawnCount = activeEffect === 'mix' ? 5 : 4;
            for (let i = 0; i < spawnCount; i++) {
                particles.push(new Sparkle(clientX, clientY, effect));
            }
            if (Math.random() > 0.6) {
                particles.push(new Sparkle(clientX, clientY, 'ribbon'));
                particles.push(new Sparkle(clientX, clientY, 'rainbow'));
            }

            playMagicalChime();
        }

        // マウスクリック
        interactionZone.addEventListener('mousedown', (e) => {
            if (e.target.closest('.neon-capsule-bar') || e.target.closest('#controlPanel') || e.target.closest('#togglePanelBtn') || e.target.closest('button')) {
                return;
            }
            spawnSparkles(e.clientX, e.clientY);
            
            function onMouseMove(moveEvent) {
                spawnSparkles(moveEvent.clientX, moveEvent.clientY);
            }
            
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', () => {
                window.removeEventListener('mousemove', onMouseMove);
            }, { once: true });
        });

        // タッチイベント (スマホ・タブレット対応)
        interactionZone.addEventListener('touchstart', (e) => {
            if (e.target.closest('.neon-capsule-bar') || e.target.closest('#controlPanel') || e.target.closest('#togglePanelBtn') || e.target.closest('button')) {
                return;
            }
            unlockAudioEngine(); // タッチの瞬間に確実にオーディオシステムを解放
            for (let i = 0; i < e.touches.length; i++) {
                spawnSparkles(e.touches[i].clientX, e.touches[i].clientY);
            }
        }, { passive: true });

        // スライド中はスクロールを止めてキラキラを出し続ける
        interactionZone.addEventListener('touchmove', (e) => {
            if (e.target.closest('.neon-capsule-bar') || e.target.closest('#controlPanel') || e.target.closest('#togglePanelBtn') || e.target.closest('button')) {
                return;
            }
            if (e.cancelable) {
                e.preventDefault();
            }
            for (let i = 0; i < e.touches.length; i++) {
                spawnSparkles(e.touches[i].clientX, e.touches[i].clientY);
            }
        }, { passive: false });

        // アニメーションループ
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 背景の光ダストの描画
            airDusts.forEach(dust => {
                dust.update();
                dust.draw();
            });

            // 2. 常時漂うシャボン玉・星・リボンたちの描画
            backgroundBubbles.forEach(bubble => {
                bubble.update();
                bubble.draw();
            });

            // 3. 弾け飛んだ各種エフェクトの描画
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        window.onload = function() {
            animate();
        };
    </script>
</body>
</html>
